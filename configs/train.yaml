model:
  name: "unsloth/Llama-3.1-8B"
  max_seq_length: 2048
  load_in_4bit: true

lora:
  r: 16
  lora_alpha: 16
  lora_dropout: 0
  bias: "none"
  target_modules: ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]

data:
  dataset_name: "PolyAI/banking77"
  train_sample_size: 6000
  val_size: 0.1
  test_sample_size: 1000
  seed: 42

training:
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 4
  warmup_steps: 5
  num_train_epochs: 1
  learning_rate: 0.0002
  eval_strategy: "steps"
  eval_steps: 50
  logging_steps: 1
  optim: "adamw_8bit"
  weight_decay: 0.001
  lr_scheduler_type: "linear"
  seed: 3407
  output_dir: "outputs"
  save_model_path: "llama_lora"